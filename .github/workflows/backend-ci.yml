name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Compile backend and scripts
        run: python -m compileall app tests ../scripts

      - name: Validate QA script CLIs
        run: |
          python ../scripts/benchmark_backend.py --help
          python ../scripts/cleanup_validation_lotes.py --help
          python ../scripts/seed_validation_users.py --help

      - name: Run tests
        run: python -m pytest

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build
